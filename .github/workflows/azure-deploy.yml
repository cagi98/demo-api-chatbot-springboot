name: CI/CD for Spring Boot with Profiles

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # build et tests
  build-test:
    runs-on: ubuntu-latest
    permissions: # Permissions pour poster le commentaire JaCoCo
      pull-requests: write
      contents: read

    steps:
      # 1. Checkout le code source
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up l'environnement JAVA
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Exécuter les tests avec le profil test
      - name: Run Tests
        run: mvn clean package -Dspring.profiles.active=test
        env:
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          TEST_OLLAMA_URL: ${{ secrets.TEST_OLLAMA_URL }}

      # 3.1. Couverture de test avec Jacoco
      - name: Upload JaCoCo Report as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Add Coverage PR Comment
        uses: madrapps/jacoco-report@v1.7.1 # Popular marketplace action
        if: github.event_name == 'pull_request'
        with:
          paths: ${{ github.workspace }}/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-files: 80

      # On sauvegarde le JAR pour le stage suivant
      - name: Upload Build Artifact (JAR)
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  # deploiement
  deploy:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      # 4. Deployer sur azure
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'sprintboot-api-chatbot-demo'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: target/*.jar
