name: CI/CD for Spring Boot with Profiles

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout le code source
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up l'environnement JAVA
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Exécuter les tests avec le profil test
      - name: Run Tests
        run: mvn test -Dspring.profiles.active=test
        env:
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          OLLAMA_URL: ${{ secrets.TEST_OLLAMA_URL }}

      # 4. Builder le projet
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 5. Deployer sur azure
      # Use the 'azure/webapps-deploy' action which supports 'publish-profile'
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'sprintboot-api-chatbot-demo'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: target/*.jar
