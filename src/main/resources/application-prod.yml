spring:
  application:
    name: restapi
  ai:
    ollama:
      base-url: ${OLLAMA_URL}
      init:
        pull-model-strategy: never
      chat:
        options:
          model: tinyllama
  security:
    user:
      name: ${APP_SECURITY_USERNAME}
      password: ${APP_SECURITY_PASSWORD}

springdoc:
  api-docs:
    path: /api-docs